# -----------------------------------------------------------------------------
# Music I want to share
#
# Structure: group by GENRE (each with a one-line blurb). Inside a genre, every
# entry is tagged as an album or a single via `type`, and the page automatically
# splits them into an "Albums" area and a "Singles" area.
#
# Add a new genre : copy a whole top-level block (genre + desc + items).
# Add a release    : copy one entry under an existing genre's `items`.
#
# Genre fields:
#   genre  name of the genre, e.g. Pop / Indie Folk / R&B   (required)
#   desc   one line describing the genre                    (optional)
#   items  list of releases in this genre
# Release fields:
#   title    album or single name                           (required)
#   artist   artist / band                                  (required)
#   type     album | single  (decides which area it lands in)  (required)
#   release  release month as "YYYY-MM", e.g. "2020-07"     (keep the quotes)
#   cover    cover image under assets/img/music/            (optional)
#   note     one-line recommendation / mood                 (optional)
#   lyrics   lyrics to share; multiple songs allowed, each: song + lines
# -----------------------------------------------------------------------------

- genre: Art Pop
  desc: Pop with the edges left strange — soaring vocals, bold production, zero fear.
  items:
    - title: Sunset
      artist: Caroline Polachek
      type: single
      release: "2023-01"
      cover: assets/img/music/sunset.png
      note: Flamenco guitars and a golden-hour rush — from Desire, I Want to Turn Into You.
      lyrics:
        - song: Sunset
          lines: |
            Fiery red, forever fearless
            And in your arms, a warm horizon
            Don't look back, let's ride away

- genre: R&B / Soul
  desc: Velvet vocals, live strings, and heartbreak delivered with a big-band swagger.
  items:
    - title: Click Clack Symphony
      artist: RAYE, Hans Zimmer
      type: single
      release: "2026-03"
      cover: assets/img/music/click-clack-symphony.png
      note: A heel-click beat under a full Zimmer orchestra — from This Music May Contain Hope.
      lyrics:
        - song: Click Clack Symphony
          lines: |
            The cold never lasts, my darling
            It just teaches the heart how to burn

- genre: Pop
  desc: Big hooks and feelings worn on the sleeve — the songs I keep on repeat.
  items:
    - title: Wildflower
      artist: Billie Eilish
      type: single
      release: "2024-05"
      cover: assets/img/music/wildflower.png
      note: A jealous ache sung barely above a whisper — from Hit Me Hard and Soft.
      lyrics:
        - song: Wildflower
          lines: |
            Feels like a fever (like a fever), like I'm burning alive (burning alive)
            Like a sign
            Did I cross the line?
    - title: folklore
      artist: Taylor Swift
      type: album
      release: "2020-07"
      cover: assets/img/music/folklore.png
      note: A record that smells like grey skies, old wood, and pine.
      lyrics:
        - song: seven
          lines: |
            Sweet tea in the summer
            Cross your heart, won't tell no other
            And though I can't recall your face
            I still got love for you
        - song: seven
          lines: |
            We'll move to India together
            Pass down like folk songs, our love lasts so long
