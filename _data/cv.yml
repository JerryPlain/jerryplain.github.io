    Projects:
      - name: Foundation Model-based Representation Learning for Vision-Guided Robotic Ultrasound
        start_date: 2025-10
        end_date: 2026-03
        highlights:
          - Developed a geometry-aware real-to-sim pipeline that scales sparse robotic ultrasound acquisitions into large-scale synthetic datasets through CBCT reslicing, LC2 registration, paired ultrasound rendering, and physically valid trajectory generation.
          - Benchmarked general, medical, and ultrasound foundation models for robotic ultrasound segmentation.

      - name: LLM-assisted Hierarchical Reward Shaping for Offline-to-Online RL in Warehouse Navigation
        start_date: 2025-10
        end_date: 2026-03
        highlights:
          - Built an offline-to-online RL pipeline for AGV navigation using Nav2 critic-based (A* + DWB) expert data and TD3-BC initialization with domain randomization.
          - Developed an LLM-assisted Hierarchical Potential-based Reward Shaping (HPRS) framework for automated failure diagnosis and reward refinement.

      - name: Simulation-based Modeling and Control of Humanoid Robot
        start_date: 2025-04
        end_date: 2025-07
        highlights:
          - Built a ROS2–PyBullet–Pinocchio simulation and control stack for the TALOS humanoid, implementing floating-base dynamics, inverse dynamics control, and whole-body TSID for standing and single-leg balance.
          - Integrated ZMP/DCM-based balance strategies with LIP-MPC footstep planning and swing-foot trajectory generation to achieve stable walking in simulation.

